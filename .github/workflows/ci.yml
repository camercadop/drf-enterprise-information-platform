name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: eip_test
          POSTGRES_USER: eip_user
          POSTGRES_PASSWORD: eip_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U eip_user -d eip_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://eip_user:eip_password@localhost:5432/eip_test
      DJANGO_SETTINGS_MODULE: config.settings.test
      SECRET_KEY: ci-test-secret-key
      ALLOWED_HOSTS: localhost
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          allow-prereleases: true

      - run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy .

      - name: Check permission catalog
        run: uv run python manage.py check_permission_catalog

      - name: Validate OpenAPI schema
        run: uv run python manage.py spectacular --validate --fail-on-warn

      - name: Migrate
        run: uv run python manage.py migrate

      - name: Test
        run: uv run pytest
